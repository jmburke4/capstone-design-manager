<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Project Documentation - Capstone Design Manager</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="sidenav.css">
    <script src="theme.js"></script>
    <!-- Only page specific styles go here -->
    <style>
        main {
            margin-top: 0;
            margin-bottom: 0;
        }

        iframe {
            width: 100%;
            height: auto;
            aspect-ratio: 16/9;
        }
    </style>
    <script src="markdown.js"></script>
    <script>
        window.onload = function () {
            const contentId = 'content';
            const storageKey = 'about-page-section';

            function clearUrlHash() {
                if (window.location.hash) {
                    history.replaceState(null, '', window.location.pathname + window.location.search);
                }
            }

            function rememberSection(markdownPath) {
                try {
                    localStorage.setItem(storageKey, markdownPath);
                } catch (error) {
                    // Ignore storage failures and fall back to the current load only.
                }
            }

            async function loadSection(markdownPath) {
                try {
                    rememberSection(markdownPath);
                    await renderMarkdown(contentId, markdownPath);
                } catch (error) {
                    const content = document.getElementById(contentId);
                    if (content) {
                        content.innerHTML = `
                            <article class="markdown-body">
                                <h2>Content Not Available Yet</h2>
                                <p>Could not load: <code>${markdownPath}</code></p>
                            </article>
                        `;
                    }
                }
            }

            document.querySelectorAll('.sidenav a[data-md], .sidenav a[data-video]').forEach((link) => {
                link.addEventListener('click', (event) => {
                    event.preventDefault();
                    clearUrlHash();

                    const markdownPath = link.getAttribute('data-md');
                    if (markdownPath) {
                        loadSection(markdownPath);
                    }

                    const video = link.getAttribute('data-video');
                    if (video) {
                        const container = document.getElementById('content');
                        container.innerHTML = `<iframe src="${video}" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>`
                    }
                });
            });

            const savedSection = (() => {
                try {
                    return localStorage.getItem(storageKey);
                } catch (error) {
                    return null;
                }
            })();

            loadSection(savedSection || 'https://www.youtube.com/embed/FEcXGf6hiFY?si=7UvLy_mTUnzpvnUY');
        };
    </script>
</head>

<body>
    <header>
        <h1>Capstone Design Manager</h1>
        <p>Project Documentation</p>
    </header>

    <div class="sidenav">
        <a href="#" data-video="https://www.youtube.com/embed/FEcXGf6hiFY?si=7UvLy_mTUnzpvnUY">Project Video</a>
        <a href="#" data-md="./assets/about/backlog.md">Backlog</a>
        <a href="#" data-md="./assets/about/cyber-security.md">Cyber Security</a>
        <a href="#" data-md="./assets/about/features.md">Features</a>
        <a href="#" data-md="./assets/about/deployment.md">Deployment</a>
        <a href="#" data-md="./assets/about/user-guide.md">User Guide</a>
        <a href="#" data-md="./assets/about/development-guide.md">Development</a>
        <a href="#" data-md="./assets/about/faqs.md">FAQs</a>
        <a href="#" data-md="./assets/about/test-strategy.md">Testing</a>
        <p><a href="index.html">← Home</a></p>
    </div>

    <main>
        <div id="content"></div>
    </main>

    <footer>
        © 2026 Capstone Design Manager · Inspired by The University of Alabama
    </footer>
</body>

</html>
