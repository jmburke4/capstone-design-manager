services:
  nginx:
    build: ./nginx
    container_name: capstone-nginx
    ports:
      - "8080:8080"
      - "8443:8443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:rw
      - letsencrypt:/etc/letsencrypt:ro
      - certbot-webroot:/var/www/certbot:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
      - static-files:/usr/share/nginx/staticfiles:ro
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-network
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: capstone-backend
    command: gunicorn --config gunicorn.conf.py core.wsgi:application
    user: "appuser"
    env_file:
      - .env.production
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - static-files:/usr/src/app/staticfiles  # FIXED: Match Dockerfile path
    restart: unless-stopped
    networks:
      - app-network
  db:
    image: postgres:17
    container_name: capstone-db
    env_file:
      - .env.production.db
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backups:/backups
    restart: unless-stopped
    networks:
      - app-network
    shm_size: 128mb
  certbot:
    image: certbot/certbot
    container_name: capstone-certbot
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot-webroot:/var/www/certbot
    environment:
      - VM_USERNAME=${VM_USERNAME:-colewalkerkelley_gmail_com}
    entrypoint: /bin/sh -c '
      trap exit TERM;
      while :; do
        certbot renew --deploy-hook "docker compose -f /home/$${VM_USERNAME}/capstone/docker-compose.prod.yml exec -T nginx nginx -s reload" --quiet || true;
        sleep 12h & wait $${!};
      done'
    restart: unless-stopped
volumes:
  postgres-data:
  static-files:
  letsencrypt:
  certbot-webroot:
networks:
  app-network:
