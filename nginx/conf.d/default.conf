# Default configuration - HTTP only (before SSL is setup)
# This file will be replaced by redirect.conf and https.conf after SSL setup
# Note: This configuration serves Vue SPA static files directly (no frontend container)

upstream backend {
    server backend:8000;
}

# HTTP Server
# Rootless Docker: Listen on 8080 instead of 80
# iptables redirects port 80 -> 8080 on the VM
server {
    listen 8080;
    server_name _;

    # Root directory for Vue SPA static files (mounted from ./frontend/dist)
    root /usr/share/nginx/html;
    index index.html;

    # Let's Encrypt ACME challenge (for SSL certificate validation)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Health check endpoint (for monitoring)
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Django static files - served directly from shared volume
    # Gunicorn doesn't serve static files; nginx serves them directly
    location /static/ {
        alias /usr/share/nginx/staticfiles/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Django admin panel
    location /admin/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # Django API endpoints
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_pass_header Authorization;
    }

    # Vue.js SPA - all other routes
    # Serve static files directly, fallback to index.html for client-side routing
    location / {
        try_files $uri $uri/ @indexfallback;
    }
    
    # Fallback location to prevent infinite loops
    location @indexfallback {
        rewrite ^ /index.html last;
    }

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
