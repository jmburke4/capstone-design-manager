{% extends "admin/base.html" %}

{% block extrastyle %}
{{ block.super }}
<style>
    .email-form { max-width: 500px; margin: 20px auto; }
    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
    .form-group input, .form-group textarea { 
        width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;
    }
    .form-group textarea { height: 60px; }
    .submit-row { margin-top: 20px; }
    .selected-count { 
        background: #f5f5f5; padding: 10px; border-radius: 4px; margin-bottom: 15px;
    }
    .info-text { font-size: 12px; color: #666; margin-top: 3px; }
</style>
{% endblock %}

{% block content %}
<div class="email-form">
    <h1>Export Project Presentation as HTML</h1>
    
    <div class="selected-count">
        {{ queryset|length }} sponsor(s) selected
    </div>
    
    <form method="get">
        {% csrf_token %}
        {% for obj in queryset %}
        <input type="hidden" name="{{ action_checkbox_name }}" value="{{ obj.pk }}">
        {% endfor %}
        <input type="hidden" name="action" value="export_project_presentation_email">
        
        <div class="form-group">
            <label for="date">Date</label>
            <input type="text" name="date" id="date" placeholder="Tuesday Jan 14, 2025">
        </div>
        
        <div class="form-group">
            <label for="time">Time</label>
            <input type="text" name="time" id="time" placeholder="3:45 - 4:00">
        </div>
        
        <div class="form-group">
            <label for="project_name">Project Name</label>
            <input type="text" name="project_name" id="project_name" placeholder="Project Name">
        </div>
        
        <div class="form-group">
            <label for="project_description">Project Description</label>
            <textarea name="project_description" id="project_description" placeholder="Description"></textarea>
        </div>
        
        <div class="form-group">
            <label for="contact_name">Contact Name</label>
            <input type="text" name="contact_name" id="contact_name" placeholder="John Doe">
        </div>
        
        <div class="form-group">
            <label for="contact_email">Contact Email</label>
            <input type="email" name="contact_email" id="contact_email" placeholder="john@example.com">
        </div>
        
        <div class="form-group">
            <label for="zoom_details">Zoom Details</label>
            <textarea name="zoom_details" id="zoom_details" placeholder="Zoom meeting link"></textarea>
        </div>
        
        <div class="submit-row">
            <input type="submit" name="apply" value="Export HTML" class="default">
            <a href="/" onclick="window.history.back(); return false;" class="button cancel-link">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
