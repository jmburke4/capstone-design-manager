{% extends "admin/base.html" %}

{% block extrastyle %}
{{ block.super }}
<style>
    .email-form { max-width: 500px; margin: 20px auto; }
    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
    .form-group input, .form-group select { 
        width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;
    }
    .submit-row { margin-top: 20px; }
    .selected-count { 
        background: #f5f5f5; padding: 10px; border-radius: 4px; margin-bottom: 15px;
    }
    .info-text { font-size: 12px; color: #666; margin-top: 3px; }
</style>
{% endblock %}

{% block content %}
<div class="email-form">
    <h1>Export Sponsor Outreach as HTML</h1>
    
    <div class="selected-count">
        {{ queryset|length }} sponsor(s) selected
    </div>
    
    <form method="get">
        {% csrf_token %}
        {% for obj in queryset %}
        <input type="hidden" name="{{ action_checkbox_name }}" value="{{ obj.pk }}">
        {% endfor %}
        <input type="hidden" name="action" value="export_sponsor_outreach_email">
        
        <div class="form-group">
            <label for="semester">Semester</label>
            <select name="semester" id="semester">
                <option value="spring">Spring</option>
                <option value="fall">Fall</option>
            </select>
        </div>
        
        <div class="form-group">
            <label for="collection_date">Collection Date</label>
            <input type="text" name="collection_date" id="collection_date" placeholder="Spring 2025 (1/14/25)">
        </div>
        
        <div class="submit-row">
            <input type="submit" name="apply" value="Export HTML" class="default">
            <a href="/" onclick="window.history.back(); return false;" class="button cancel-link">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
