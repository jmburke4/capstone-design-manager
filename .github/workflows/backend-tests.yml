name: Backend Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    services:
      db:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend Docker image
        run: docker build -t backend-test ./backend

      - name: Run pytest in Docker container
        run: |
          docker run --rm \
            --network=host \
            -e SECRET_KEY=${{ secrets.SECRET_KEY || 'test-secret-key-for-ci-only' }} \
            -e DEBUG=1 \
            -e DJANGO_ALLOWED_HOSTS="localhost 127.0.0.1" \
            -e SQL_ENGINE=django.db.backends.postgresql \
            -e SQL_DATABASE=test_db \
            -e SQL_USER=postgres \
            -e SQL_PASSWORD=postgres \
            -e SQL_HOST=localhost \
            -e SQL_PORT=5432 \
            -e DATABASE=postgres \
            backend-test \
            pytest --cov=. --cov-report=term-missing -v
