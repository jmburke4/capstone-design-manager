# HTTP to HTTPS redirect configuration
# This file should be created/copied after SSL is configured
# IMPORTANT: Must include ACME challenge location for Let's Encrypt renewal

server {
    listen 8080 default_server;
    server_name _;

    # Let's Encrypt ACME challenge (must be accessible for certificate renewal)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}
